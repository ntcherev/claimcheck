name: claimcheck
description: >-
  A linter that keeps agent-facing docs true: verifies paths, links, anchors,
  symbols, memory imports, and commit citations in markdown against the
  actual codebase.
author: claimcheck
branding:
  icon: check-circle
  color: green

inputs:
  paths:
    description: "Docs or directories to check (default: whole repo)"
    required: false
    default: ""
  strict:
    description: Fail on warnings too, not just errors
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: claimcheck check
      shell: bash
      env:
        PYTHONPATH: ${{ github.action_path }}
      run: >-
        python3 -m claimcheck check
        ${{ inputs.strict == 'true' && '--strict' || '' }}
        ${{ inputs.paths }}
