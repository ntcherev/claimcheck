name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # stamp staleness needs history
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit and integration tests
        run: python3 -m unittest discover -s tests
      - name: Self-check (dogfood, strict)
        run: python3 -m claimcheck check --strict

  action:
    # The published composite action, exercised on this very repo.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          strict: "true"
